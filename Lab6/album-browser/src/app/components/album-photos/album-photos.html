<h3>Album Photos</h3>
<button [routerLink]="['/albums', photos()[0]?.albumId]">Back to Album</button>

@if (loading()) {
  <div>Loading photos...</div>
} @else {
  <div class="photo-grid">
    @for (photo of photos(); track photo.id) {
      <div class="photo-card">
        <img [src]="photo.thumbnailUrl" [alt]="photo.title">
        <p>{{ photo.title }}</p>
      </div>
    } @empty {
      <p>No photos found.</p>
    }
  </div>
}
