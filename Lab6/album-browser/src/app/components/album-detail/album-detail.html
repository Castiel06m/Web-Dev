@if (loading()) {
  <p>Loading details...</p>
} @else if (album()) {
  <h3>Album #{{ album()?.id }}</h3>
  
  <div>
    <input [ngModel]="newTitle()" (ngModelChange)="newTitle.set($event)" type="text">
    <button (click)="saveChanges()">Save</button>
  </div>

  <button [routerLink]="['/albums']">Back</button>
  <button [routerLink]="['/albums', album()?.id, 'photos']">Photos</button>
} @else {
  <p>Album not found.</p>
}
